<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 人脸识别与健康关联分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#0FC6C2',
                        success: '#00B42A',
                        warning: '#FF7D00',
                        danger: '#F53F3F',
                        dark: '#1D2129',
                        'gray-100': '#F2F3F5',
                        'gray-200': '#E5E6EB',
                        'gray-300': '#C9CDD4',
                        'gray-400': '#86909C',
                        'gray-500': '#4E5969',
                        'gray-600': '#272E3B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .btn-primary {
                @apply bg-primary hover:bg-primary/90 text-white font-medium py-3 px-6 rounded-lg transition-all duration-300 shadow-md hover:shadow-lg;
            }
            .btn-outline {
                @apply border border-primary text-primary hover:bg-primary hover:text-white font-medium py-2 px-6 rounded-lg transition-all duration-300;
            }
            .btn-ghost {
                @apply text-gray-600 hover:text-primary font-medium py-2 px-4 rounded-lg transition-all duration-300;
            }
            .card {
                @apply bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden;
            }
            .input-field {
                @apply w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-200;
            }
            .input-error {
                @apply border-danger focus:ring-danger/30 focus:border-danger;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-600 min-h-screen flex flex-col">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <!-- Logo和系统名称 -->
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                        <i class="fa fa-id-card text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-dark">人脸识别与健康关联分析系统</h1>
                </div>

                <!-- 主导航 -->
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-600 hover:text-primary transition-colors">首页</a>
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors">快速健康分析</a>
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors">历史报告</a>
                    <a href="#" class="text-gray-600 hover:text-primary transition-colors">系统公告</a>
                </nav>

                <!-- 右侧功能区 -->
                <div class="flex items-center space-x-4">
                    <!-- 搜索框 -->
                    <div class="relative hidden md:block">
                        <input type="text" placeholder="搜索..." class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-200 w-48">
                        <i class="fa fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    </div>

                    <!-- 登录/注册按钮 -->
                    <a href="login.html" class="btn-ghost">登录</a>
                    <a href="register.html" class="btn-primary">注册</a>

                    <!-- 移动端菜单按钮 -->
                    <button class="md:hidden text-gray-600 hover:text-primary">
                        <i class="fa fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="flex-1 pt-24 pb-16">
        <div class="container mx-auto px-4">
            <div class="max-w-md mx-auto">
                <!-- 注册卡片 -->
                <div class="card p-8">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-dark mb-2">创建账号</h2>
                        <p class="text-gray-500">注册账号即可使用人脸识别健康检测等全部功能</p>
                    </div>

                    <!-- 注册表单 -->
                    <form id="registerForm" class="space-y-5">
                        <!-- 用户名 -->
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">
                                用户名 <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="username" name="username" class="input-field" placeholder="请输入用户名" required>
                            <p class="text-xs text-danger mt-1 hidden" id="usernameError">用户名长度应为3-20个字符</p>
                        </div>

                        <!-- 密码 -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                                密码 <span class="text-danger">*</span>
                            </label>
                            <input type="password" id="password" name="password" class="input-field" placeholder="请输入密码" required>
                            <p class="text-xs text-gray-400 mt-1">密码长度至少6位，包含字母和数字</p>
                            <p class="text-xs text-danger mt-1 hidden" id="passwordError">密码长度至少6位</p>
                        </div>

                        <!-- 确认密码 -->
                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
                                确认密码 <span class="text-danger">*</span>
                            </label>
                            <input type="password" id="confirmPassword" name="confirmPassword" class="input-field" placeholder="请再次输入密码" required>
                            <p class="text-xs text-danger mt-1 hidden" id="confirmPasswordError">两次输入的密码不一致</p>
                        </div>

                        <!-- 真实姓名 -->
                        <div>
                            <label for="realName" class="block text-sm font-medium text-gray-700 mb-1">
                                真实姓名 <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="realName" name="realName" class="input-field" placeholder="请输入真实姓名" required>
                            <p class="text-xs text-danger mt-1 hidden" id="realNameError">请输入真实姓名</p>
                        </div>

                        <!-- 性别 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                性别 <span class="text-danger">*</span>
                            </label>
                            <div class="flex space-x-8">
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="gender" value="male" class="w-4 h-4 text-primary focus:ring-primary" checked>
                                    <span class="ml-2 text-gray-700">男</span>
                                </label>
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="gender" value="female" class="w-4 h-4 text-primary focus:ring-primary">
                                    <span class="ml-2 text-gray-700">女</span>
                                </label>
                            </div>
                        </div>

                        <!-- 手机号 -->
                        <div>
                            <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">
                                手机号 <span class="text-danger">*</span>
                            </label>
                            <input type="tel" id="phone" name="phone" class="input-field" placeholder="请输入手机号" required>
                            <p class="text-xs text-danger mt-1 hidden" id="phoneError">请输入正确的手机号格式</p>
                        </div>

                        <!-- 注册按钮 -->
                        <button type="submit" class="btn-primary w-full text-lg py-3 mt-6">
                            立即注册
                        </button>

                        <!-- 登录链接 -->
                        <div class="text-center mt-4">
                            <span class="text-gray-500">已有账号？</span>
                            <a href="login.html" class="text-primary hover:text-primary/80 font-medium">立即登录</a>
                        </div>
                    </form>
                </div>

                <!-- 底部提示 -->
                <div class="text-center mt-6 text-sm text-gray-500">
                    <p>注册即表示您同意我们的 <a href="#" class="text-primary hover:underline">服务条款</a> 和 <a href="#" class="text-primary hover:underline">隐私政策</a></p>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4">
            <div class="border-t border-gray-700 pt-6 flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-400 text-sm mb-4 md:mb-0">
                    © 2024 人脸识别与健康关联分析系统 版权所有
                </p>
                <div class="flex space-x-6">
                    <a href="#" class="text-gray-400 hover:text-white transition-colors">隐私政策</a>
                    <a href="#" class="text-gray-400 hover:text-white transition-colors">服务条款</a>
                    <a href="#" class="text-gray-400 hover:text-white transition-colors">联系我们</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // 表单验证
        const registerForm = document.getElementById('registerForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirmPassword');
        const realName = document.getElementById('realName');
        const phone = document.getElementById('phone');
        
        const usernameError = document.getElementById('usernameError');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const realNameError = document.getElementById('realNameError');
        const phoneError = document.getElementById('phoneError');

        // 用户名验证
        function validateUsername() {
            if (username.value.length < 3 || username.value.length > 20) {
                username.classList.add('input-error');
                usernameError.classList.remove('hidden');
                return false;
            } else {
                username.classList.remove('input-error');
                usernameError.classList.add('hidden');
                return true;
            }
        }

        // 密码验证
        function validatePassword() {
            if (password.value.length < 6) {
                password.classList.add('input-error');
                passwordError.classList.remove('hidden');
                return false;
            } else {
                password.classList.remove('input-error');
                passwordError.classList.add('hidden');
                return true;
            }
        }

        // 确认密码验证
        function validateConfirmPassword() {
            if (confirmPassword.value !== password.value) {
                confirmPassword.classList.add('input-error');
                confirmPasswordError.classList.remove('hidden');
                return false;
            } else {
                confirmPassword.classList.remove('input-error');
                confirmPasswordError.classList.add('hidden');
                return true;
            }
        }

        // 真实姓名验证
        function validateRealName() {
            if (realName.value.trim() === '') {
                realName.classList.add('input-error');
                realNameError.classList.remove('hidden');
                return false;
            } else {
                realName.classList.remove('input-error');
                realNameError.classList.add('hidden');
                return true;
            }
        }

        // 手机号验证
        function validatePhone() {
            const phoneRegex = /^1[3-9]\d{9}$/;
            if (!phoneRegex.test(phone.value)) {
                phone.classList.add('input-error');
                phoneError.classList.remove('hidden');
                return false;
            } else {
                phone.classList.remove('input-error');
                phoneError.classList.add('hidden');
                return true;
            }
        }

        // 实时验证
        username.addEventListener('blur', validateUsername);
        password.addEventListener('blur', validatePassword);
        confirmPassword.addEventListener('blur', validateConfirmPassword);
        realName.addEventListener('blur', validateRealName);
        phone.addEventListener('blur', validatePhone);

        // 表单提交
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // 执行所有验证
            const isUsernameValid = validateUsername();
            const isPasswordValid = validatePassword();
            const isConfirmPasswordValid = validateConfirmPassword();
            const isRealNameValid = validateRealName();
            const isPhoneValid = validatePhone();
            
            // 如果所有验证都通过
            if (isUsernameValid && isPasswordValid && isConfirmPasswordValid && isRealNameValid && isPhoneValid) {
                // 这里可以添加AJAX请求提交注册数据的逻辑
                alert('注册成功！即将跳转到登录页面');
                // 模拟跳转到登录页面
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1000);
            }
        });

        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const targetId = this.getAttribute('href');
                if (targetId === '#') return;
                
                const targetElement = document.querySelector(targetId);
                if (targetElement) {
                    targetElement.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
    <script src="app.js"></script>
</body>
</html>
