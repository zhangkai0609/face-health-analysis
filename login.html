<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 人脸识别与健康关联分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#165DFF',
                        secondary: '#0FC6C2',
                        danger: '#F53F3F',
                        dark: '#1D2129'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .btn-primary {
                @apply bg-primary hover:bg-primary/90 text-white font-medium py-3 px-6 rounded-lg transition-all duration-300 shadow-md hover:shadow-lg;
            }
            .btn-ghost {
                @apply text-gray-600 hover:text-primary font-medium py-2 px-4 rounded-lg transition-all duration-300;
            }
            .input-field {
                @apply w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all duration-200;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-600 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm fixed top-0 left-0 right-0 z-50">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="首页管理.html" class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
                        <i class="fa fa-id-card text-white text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-dark">人脸识别与健康关联分析系统</h1>
                </a>
                <nav class="hidden md:flex items-center space-x-8">
                    <a href="首页管理.html" class="text-gray-600 hover:text-primary transition-colors">首页</a>
                    <a href="健康数据管理界面.html" class="text-gray-600 hover:text-primary transition-colors">快速健康分析</a>
                    <a href="健康报告管理界面.html" class="text-gray-600 hover:text-primary transition-colors">历史报告</a>
                    <a href="公告管理界面.html" class="text-gray-600 hover:text-primary transition-colors">系统公告</a>
                </nav>
                <div class="flex items-center space-x-4">
                    <a href="用户注册.html" class="btn-ghost">注册</a>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 pt-24 pb-16">
        <div class="container mx-auto px-4">
            <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg border border-gray-200 p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-dark mb-2">用户登录</h2>
                    <p class="text-gray-500">登录后返回首页，再进入个人中心查看健康报告和识别记录</p>
                </div>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label for="loginUsername" class="block text-sm font-medium text-gray-700 mb-1">
                            用户名 <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="loginUsername" class="input-field" placeholder="请输入用户名" required>
                    </div>
                    <div>
                        <label for="loginPassword" class="block text-sm font-medium text-gray-700 mb-1">
                            密码 <span class="text-danger">*</span>
                        </label>
                        <input type="password" id="loginPassword" class="input-field" placeholder="请输入密码" required>
                    </div>
                    <button type="submit" class="btn-primary w-full text-lg py-3 mt-6">
                        登录
                    </button>
                    <div class="text-center mt-4">
                        <span class="text-gray-500">还没有账号？</span>
                        <a href="用户注册.html" class="text-primary hover:text-primary/80 font-medium">立即注册</a>
                    </div>
                    <p class="text-xs text-gray-400 text-center">
                        测试账号：zhangsan / 123456
                    </p>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-8">
        <div class="container mx-auto px-4">
            <div class="border-t border-gray-700 pt-6 flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-400 text-sm mb-4 md:mb-0">
                    © 2026 人脸识别与健康关联分析系统
                </p>
                <div class="flex space-x-6">
                    <a href="用户管理界面.html" class="text-gray-400 hover:text-white transition-colors">后台管理</a>
                    <a href="公告管理界面.html" class="text-gray-400 hover:text-white transition-colors">系统公告</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
