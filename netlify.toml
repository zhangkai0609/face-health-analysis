[build]
  command = "node scripts/build.js"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/"
  to = "/首页管理.html"
  status = 200

[[redirects]]
  from = "/index.html"
  to = "/首页管理.html"
  status = 200

[[redirects]]
  from = "/admin.html"
  to = "/管理员登录界面.html"
  status = 200

[[redirects]]
  from = "/admin-login.html"
  to = "/管理员登录界面.html"
  status = 200
